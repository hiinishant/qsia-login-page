<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="style.css">
    <link rel="Icon" href="qsia.png">
</head>

<body>
    <form action="" class="rform">
        <div class="inputBox ib">
            <input id="name" type="text" required>
            <label>Full Name</label>
            <span class="mail">✉︎</span>
        </div>

        <div class="inputBox ib">
            <input id="" type="text" required>
            <label>Class</label>
            <span class="mail">✉︎</span>
        </div>

        <div class="inputBox ib">
            <input id="fname" type="text" required>
            <label>Father Name</label>
            <span class="mail">✉︎</span>
        </div>

        <div class="inputBox ib">
            <input id="mname" type="text" required>
            <label>Mother Name</label>
            <span class="mail">✉︎</span>
        </div>

        <div class="inputBox ib">
            <input id="pnumber" type="tel" required>
            <label>Phone Number</label>
            <span class="mail">✉︎</span>
        </div>

        <div class="inputBox ib">
            <input id="userimg" type="file" required>
            <span class="mail">✉︎</span>
        </div>

        <div class="inputBox ib">
            <input id="email" type="text" required>
            <label>Email</label>
            <span class="mail">✉︎</span>
        </div>

        <div class="inputBox ib">
            <input class="password" type="password" required>
            <label>Create Password</label>
            <span class="eye">👁</span>
        </div>

        <div class="inputBox ib">
            <input class="password" type="password" required>
            <label>Confirm Password</label>
            <span class="eye">👁</span>
        </div>

    </form>

    <script src="script.js"></script>
</body>

</html>
