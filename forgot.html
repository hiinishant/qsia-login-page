<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="Icon" href="/qsia.png">
</head>

<body>
    <form action="" class="fpage">
        <div class="inputBox">
            <input type="email" required>
            <label>Email</label>
            <span class="mail">✉︎</span>
        </div>

        <div class="inputBox">
            <input type="text" required>
            <label>O.T.P</label>
        </div>

        <div class="verify">
            <a href="#">Verify!</a>
        </div>

        <div class="inputBox">
            <input class="password" type="password" required>
            <label>New Password</label>
            <span class="eye">👁</span>
        </div>

        <div class="inputBox">
            <input class="password" type="password" required>
            <label>Confirm Password</label>
            <span class="eye">👁</span>
        </div>

        <button class="loginBtn">Login</button>
    </form>
    <script src="/script.js"></script>
</body>

</html>
