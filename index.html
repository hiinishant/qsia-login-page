<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="Icon" href="/qsia.png">
</head>

<body>

    <div class="container">
        <div class="left">
            <h1>Welcome Back</h1>
            <div class="inputBox ib">
                <input id="email" type="text" required>
                <label>Email</label>
                <span class="mail">✉︎</span>
            </div>

            <div class="inputBox ib">
                <input class="password" type="password" required>
                <label>Password</label>
                <span class="eye">👁</span>
            </div>

            <div class="forgot">
                <a href="/forgot.html">Forgot Password?</a>
            </div>
            <button class="loginBtn" >Login</button>

            <p class="register">
                Don't have an account? <a href="/register.html">Register</a>
            </p>
        </div>

        <div class="right">
            <img src="sidelogin.png">
        </div>
    </div>

    <script src="/script.js"></script>
</body>

</html>
